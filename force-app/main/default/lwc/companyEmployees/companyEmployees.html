<template>
    <div class="company-employees">
        <div class="header">
            <div class="heading">{heading}</div>
            <div class="description">{description}</div>
        </div>

        <template lwc:if={isAddEmployeeOpen}>
            <div class="employee-form">
                <div class="employee-form__grid">
                    <div class="employee-form__field">
                        <div class="employee-form__label">{fullNameLabel}</div>
                        <input
                            class="employee-form__input"
                            type="text"
                            name="fullName"
                            value={employeeForm.fullName}
                            oninput={handleEmployeeFieldChange}
                        />
                    </div>

                    <div class="employee-form__field">
                        <div class="employee-form__label">{emailLabel}</div>
                        <input
                            class="employee-form__input"
                            type="email"
                            name="email"
                            value={employeeForm.email}
                            oninput={handleEmployeeFieldChange}
                        />
                    </div>

                    <div class="employee-form__field">
                        <div class="employee-form__label">{roleTitleLabel}</div>
                        <input
                            class="employee-form__input"
                            type="text"
                            name="roleTitle"
                            value={employeeForm.roleTitle}
                            oninput={handleEmployeeFieldChange}
                        />
                    </div>

                    <div class="employee-form__field">
                        <div class="employee-form__label">{departmentLabel}</div>
                        <input
                            class="employee-form__input"
                            type="text"
                            name="department"
                            value={employeeForm.department}
                            oninput={handleEmployeeFieldChange}
                        />
                    </div>

                    <div class="employee-form__field">
                        <div class="employee-form__label">{startDateLabel}</div>
                        <input
                            class="employee-form__input"
                            type="date"
                            name="startDate"
                            value={employeeForm.startDate}
                            oninput={handleEmployeeFieldChange}
                        />
                    </div>

                    <div class="employee-form__field">
                        <div class="employee-form__label">{phoneLabel}</div>
                        <input
                            class="employee-form__input"
                            type="text"
                            name="phone"
                            value={employeeForm.phone}
                            oninput={handleEmployeeFieldChange}
                        />
                    </div>

                    <div class="employee-form__field">
                        <div class="employee-form__label">{statusLabel}</div>
                        <input
                            class="employee-form__input"
                            type="text"
                            name="status"
                            value={employeeForm.status}
                            oninput={handleEmployeeFieldChange}
                        />
                    </div>

                    <div class="employee-form__field employee-form__field--full">
                        <div class="employee-form__label">{notesLabel}</div>
                        <textarea
                            class="employee-form__input employee-form__textarea"
                            name="notes"
                            oninput={handleEmployeeFieldChange}
                        >{employeeForm.notes}</textarea>
                    </div>
                </div>

                <div class="employee-form__actions">
                    <div
                        class="employee-form__button employee-form__button--ghost"
                        onclick={handleCloseAddEmployee}
                    >
                        {cancelButtonLabel}
                    </div>
                    <div class="employee-form__button" onclick={handleAddEmployee}>
                        {saveButtonLabel}
                    </div>
                </div>
            </div>
        </template>

        <template lwc:else>
            <div class="company-section">
                <div class="company-section__header">
                    <div class="company-section__title">{companySectionTitle}</div>
                    <div class="company-section__description">{companySectionDescription}</div>
                </div>

                <div class="company-grid">
                    <div class="company-field">
                        <div class="company-field__label">{companyNameLabel}</div>
                        <div class="company-field__value">{companyNameValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{industryLabel}</div>
                        <div class="company-field__value">{industryValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{hqLocationLabel}</div>
                        <div class="company-field__value">{hqLocationValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{employeeCountLabel}</div>
                        <div class="company-field__value">{employeeCount}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{websiteLabel}</div>
                        <div class="company-field__value">{websiteValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{taxIdLabel}</div>
                        <div class="company-field__value">{taxIdValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{accountManagerLabel}</div>
                        <div class="company-field__value">{accountManagerValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{companyPhoneLabel}</div>
                        <div class="company-field__value">{companyPhoneValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{billingAddressLabel}</div>
                        <div class="company-field__value">{billingAddressValue}</div>
                    </div>

                    <div class="company-field">
                        <div class="company-field__label">{shippingAddressLabel}</div>
                        <div class="company-field__value">{shippingAddressValue}</div>
                    </div>
                </div>
            </div>

            <div class="employees-toolbar">
                <div class="employees-toolbar__title">{employeesSectionTitle}</div>
                <div class="employees-toolbar__button" onclick={handleOpenAddEmployee}>
                    {addEmployeeButtonLabel}
                </div>
            </div>

            <template lwc:if={hasEmployees}>
                <div class="list">
                    <template for:each={employees} for:item="employee">
                        <div key={employee.id} class="card">
                            <div class="employee-name">{employee.fullName}</div>
                            <div class="employee-position">{employee.roleTitle}</div>
                            <div class="employee-meta">{employee.department}</div>
                            <div class="employee-meta">{employee.email}</div>
                            <div class="employee-meta">{employee.phone}</div>
                            <div class="employee-meta">
                                {employee.status} • {employee.startDate}
                            </div>
                            <template lwc:if={employee.notes}>
                                <div class="employee-notes">{employee.notes}</div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <template lwc:else>
                <div class="empty-state">
                    <div class="empty-state-message">{emptyStateTitle}</div>
                </div>
            </template>
        </template>
    </div>
</template>
